spring.application.name=backend

# Active profile (override with -Dspring.profiles.active=prod for production)
spring.profiles.active=dev

# Database (defaults for local Podman compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openshelfrating}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:osr_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:osr_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep schema managed by Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Auth
app.auth.jwt-expiration-hours=${APP_AUTH_JWT_EXPIRATION_HOURS:24}
app.auth.verification-expiration-hours=${APP_AUTH_VERIFICATION_EXPIRATION_HOURS:24}
app.auth.base-url=${APP_AUTH_BASE_URL:http://localhost:8080}

# Optional PEM keys for RS256. If empty, backend generates ephemeral keys in memory.
app.auth.jwt-private-key-pem=${APP_AUTH_JWT_PRIVATE_KEY_PEM:}
app.auth.jwt-public-key-pem=${APP_AUTH_JWT_PUBLIC_KEY_PEM:}

# Email sending toggle — set to false in local dev to skip SMTP entirely
app.mail.enabled=${APP_MAIL_ENABLED:false}

# Local SMTP (MailHog/MailDev)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
app.mail.from=${APP_MAIL_FROM:no-reply@openshelfrating.local}

# Catalog
app.catalog.search-max-page-size=${APP_CATALOG_SEARCH_MAX_PAGE_SIZE:100}
app.catalog.isbn-validation-strict=${APP_CATALOG_ISBN_VALIDATION_STRICT:true}

# Media (S3 compatible)
app.media.allowed-mime-types=${APP_MEDIA_ALLOWED_MIME_TYPES:image/jpeg,image/png,image/webp}
app.media.max-avatar-size=${APP_MEDIA_MAX_AVATAR_SIZE:5242880}
app.media.max-cover-size=${APP_MEDIA_MAX_COVER_SIZE:10485760}
app.media.presigned-url-expiry-hours=${APP_MEDIA_PRESIGNED_URL_EXPIRY_HOURS:24}
app.media.cache-max-age-seconds=${APP_MEDIA_CACHE_MAX_AGE_SECONDS:86400}
app.media.avatar-placeholder-url=${APP_MEDIA_AVATAR_PLACEHOLDER_URL:https://placehold.co/256x256?text=avatar}
app.media.cover-placeholder-url=${APP_MEDIA_COVER_PLACEHOLDER_URL:https://placehold.co/512x768?text=cover}

app.media.s3.bucket-name=${APP_MEDIA_S3_BUCKET_NAME:openshelfrating-media}
app.media.s3.region=${APP_MEDIA_S3_REGION:us-east-1}
app.media.s3.endpoint=${APP_MEDIA_S3_ENDPOINT:http://localhost:9000}
app.media.s3.access-key=${APP_MEDIA_S3_ACCESS_KEY:minioadmin}
app.media.s3.secret-key=${APP_MEDIA_S3_SECRET_KEY:minioadmin}
