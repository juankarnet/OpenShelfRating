spring.application.name=backend

# Active profile (override with -Dspring.profiles.active=prod for production)
spring.profiles.active=dev

# Database (defaults for local Podman compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openshelfrating}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:osr_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:osr_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep schema managed by Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Auth
app.auth.jwt-expiration-hours=${APP_AUTH_JWT_EXPIRATION_HOURS:24}
app.auth.verification-expiration-hours=${APP_AUTH_VERIFICATION_EXPIRATION_HOURS:24}
app.auth.base-url=${APP_AUTH_BASE_URL:http://localhost:8080}

# Optional PEM keys for RS256. If empty, backend generates ephemeral keys in memory.
app.auth.jwt-private-key-pem=${APP_AUTH_JWT_PRIVATE_KEY_PEM:}
app.auth.jwt-public-key-pem=${APP_AUTH_JWT_PUBLIC_KEY_PEM:}

# Local SMTP (MailHog/MailDev)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}
app.mail.from=${APP_MAIL_FROM:no-reply@openshelfrating.local}

# Catalog
app.catalog.search-max-page-size=${APP_CATALOG_SEARCH_MAX_PAGE_SIZE:100}
app.catalog.isbn-validation-strict=${APP_CATALOG_ISBN_VALIDATION_STRICT:true}
