spring.application.name=backend

# Active profile (override with -Dspring.profiles.active=prod for production)
spring.profiles.active=dev

# Database (defaults for local Podman compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/openshelfrating}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:osr_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:osr_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Keep schema managed by Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
