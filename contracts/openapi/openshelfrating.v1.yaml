openapi: 3.1.0
info:
  title: OpenShelfRating API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /auth/register:
    post:
      summary: Register user with email/password
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
  /auth/login:
    post:
      summary: Login with email/password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /books:
    post:
      summary: Create book in global catalog
      operationId: createBook
      parameters:
        - in: query
          name: actorUserId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookCreateRequest'
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
  /books/search:
    get:
      summary: Search books
      operationId: searchBooks
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
        - in: query
          name: page
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: size
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Books found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooksPagedResponse'
  /books/{id}:
    get:
      summary: Get book detail
      operationId: getBook
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Book found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update book metadata
      operationId: updateBook
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: actorUserId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookUpdateRequest'
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '403':
          description: Forbidden for users who are neither creator nor admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Another book already exists with the same ISBN-13 or title-author key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /books/{bookId}/cover:
    post:
      summary: Upload book cover image
      operationId: uploadBookCover
      parameters:
        - in: path
          name: bookId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Cover uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '400':
          description: Invalid file type or malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden for users who are neither creator nor admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Uploaded file exceeds configured max cover size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get book cover access URL
      operationId: getBookCover
      parameters:
        - in: path
          name: bookId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Cover access URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAccessResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete book cover (soft-delete media reference)
      operationId: deleteBookCover
      parameters:
        - in: path
          name: bookId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Cover removed
        '403':
          description: Forbidden for users who are neither creator nor admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{userId}/library:
    get:
      summary: List user library
      operationId: listUserLibrary
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Library items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserBook'
    post:
      summary: Add book to user library
      operationId: addBookToLibrary
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserBookRequest'
      responses:
        '201':
          description: Added to library
  /users/{userId}/library/{bookId}/state:
    patch:
      summary: Update reading state
      operationId: updateReadingState
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: bookId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStateRequest'
      responses:
        '200':
          description: State updated
  /users/{userId}/library/{bookId}/review:
    post:
      summary: Create or update user review
      operationId: upsertReview
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: bookId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
      responses:
        '200':
          description: Review saved
  /users/{userId}/avatar:
    post:
      summary: Upload user avatar image
      operationId: uploadUserAvatar
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadResponse'
        '400':
          description: Invalid file type or malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden for non-owner/non-admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Uploaded file exceeds configured max avatar size
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get user avatar access URL
      operationId: getUserAvatar
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Avatar access URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAccessResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete user avatar (soft-delete media reference)
      operationId: deleteUserAvatar
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Avatar removed
        '403':
          description: Forbidden for non-owner/non-admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    AuthResponse:
      type: object
      required: [accessToken, tokenType]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          example: Bearer
    BookCreateRequest:
      type: object
      required: [title, primaryAuthor]
      properties:
        title:
          type: string
          maxLength: 255
        primaryAuthor:
          type: string
          maxLength: 255
        otherAuthors:
          type: array
          items:
            type: string
            maxLength: 255
        isbn13:
          type: string
        isbn10:
          type: string
        publisher:
          type: string
          maxLength: 255
        publicationDate:
          type: string
          format: date
        pages:
          type: integer
          minimum: 1
        language:
          type: string
          minLength: 2
          maxLength: 5
        genres:
          type: array
          items:
            $ref: '#/components/schemas/BookGenre'
        coverUrl:
          type: string
          format: uri
    BookUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        primaryAuthor:
          type: string
          maxLength: 255
        otherAuthors:
          type: array
          maxItems: 50
          items:
            type: string
            maxLength: 255
        isbn13:
          type: string
        isbn10:
          type: string
        publisher:
          type: string
          maxLength: 255
        publicationDate:
          type: string
          format: date
        pages:
          type: integer
          minimum: 1
        language:
          type: string
          minLength: 2
          maxLength: 5
        genres:
          type: array
          items:
            $ref: '#/components/schemas/BookGenre'
        coverUrl:
          type: string
          format: uri
        metadataCorrections:
          type: string
          maxLength: 1000
    BookGenre:
      type: string
      enum: [CLASSIC, FICTION, MYSTERY, THRILLER, ROMANCE, SCIENCE_FICTION, FANTASY, BIOGRAPHY, HISTORY, SELF_HELP, EDUCATION, TECHNICAL, POETRY, DRAMA, CHILDREN, YOUNG_ADULT]
    BookSearchResponse:
      type: object
      required: [bookId, title, primaryAuthor, createdBy]
      properties:
        bookId:
          type: string
          format: uuid
        title:
          type: string
        primaryAuthor:
          type: string
        coverUrl:
          type: string
          format: uri
          nullable: true
        createdBy:
          type: string
          format: uuid
    BooksPagedResponse:
      type: object
      required: [books, page, size, totalCount]
      properties:
        books:
          type: array
          items:
            $ref: '#/components/schemas/BookSearchResponse'
        page:
          type: integer
        size:
          type: integer
        totalCount:
          type: integer
          format: int64
    Book:
      type: object
      required: [bookId, title, primaryAuthor, language, createdBy, canonical, createdAt, updatedAt, existing]
      properties:
        bookId:
          type: string
          format: uuid
        title:
          type: string
        primaryAuthor:
          type: string
        otherAuthors:
          type: array
          items:
            type: string
        isbn13:
          type: string
        isbn10:
          type: string
        publisher:
          type: string
        publicationDate:
          type: string
          format: date
        pages:
          type: integer
        language:
          type: string
        genres:
          type: array
          items:
            $ref: '#/components/schemas/BookGenre'
        coverUrl:
          type: string
          format: uri
          nullable: true
        createdBy:
          type: string
          format: uuid
        canonical:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        existing:
          type: boolean
    AddUserBookRequest:
      type: object
      required: [bookId]
      properties:
        bookId:
          type: string
          format: uuid
    UserBook:
      type: object
      required: [id, book, state, addedAt]
      properties:
        id:
          type: string
          format: uuid
        book:
          $ref: '#/components/schemas/BookSearchResponse'
        state:
          type: string
          enum: [PENDING, READING, READ]
        addedAt:
          type: string
          format: date-time
        startedReadingAt:
          type: string
          format: date-time
          nullable: true
        completedReadingAt:
          type: string
          format: date-time
          nullable: true
        rating:
          type: integer
          minimum: 1
          maximum: 5
        opinion:
          type: string
          maxLength: 1000
        reviewUpdatedAt:
          type: string
          format: date-time
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true
    UpdateStateRequest:
      type: object
      required: [state]
      properties:
        state:
          type: string
          enum: [PENDING, READING, READ]
    ReviewRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        opinion:
          type: string
          maxLength: 1000
    MediaUploadResponse:
      type: object
      required: [uploadId, presignedUrl, expiresAt, mimeType, fileSize]
      properties:
        uploadId:
          type: string
          format: uuid
        presignedUrl:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
        mimeType:
          type: string
          example: image/jpeg
        fileSize:
          type: integer
          format: int64
          minimum: 0
    MediaAccessResponse:
      type: object
      required: [url, placeholder]
      properties:
        url:
          type: string
          format: uri
        expiresAt:
          type: string
          format: date-time
          nullable: true
        placeholder:
          type: boolean
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
