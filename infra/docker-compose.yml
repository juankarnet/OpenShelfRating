version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: osr-postgres
    environment:
      POSTGRES_DB: openshelfrating
      POSTGRES_USER: osr_user
      POSTGRES_PASSWORD: osr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osr_user -d openshelfrating"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: osr-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mc:
    image: minio/mc:latest
    container_name: osr-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting...' && sleep 1; done;
      /usr/bin/mc mb -p local/openshelfrating-media || true;
      /usr/bin/mc anonymous set download local/openshelfrating-media;
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
